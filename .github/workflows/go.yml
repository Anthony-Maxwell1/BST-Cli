name: Build and Release BST

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      # 1. Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Go
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22' # choose your Go version

      # 4. Build for Windows, Linux, and macOS
      - name: Build binaries
        run: |
          mkdir -p dist

          # Windows
          GOOS=windows GOARCH=amd64 go build -o dist/bst-win.exe ./cmd/bst

          # Linux
          GOOS=linux GOARCH=amd64 go build -o dist/bst-linux ./cmd/bst

          # macOS
          GOOS=darwin GOARCH=amd64 go build -o dist/bst-mac ./cmd/bst

      # 5. Create a GitHub release
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          artifacts: |
            dist/bst-win.exe
            dist/bst-linux
            dist/bst-mac
